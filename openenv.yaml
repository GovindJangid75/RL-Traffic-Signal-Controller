name: traffic-ai
version: "1.0"
description: >
  RL-based Traffic Signal Control Environment.
  An agent controls a 4-way intersection by choosing which direction gets a green light.
  Observations encode vehicle queue lengths per lane; the agent learns to minimise waiting and emissions.

# ── API endpoints (OpenEnv compatible) ──────────────────────────────────────
api:
  reset:
    method: POST
    path: /reset
    description: Reset the simulation to a new episode. Returns the initial observation state.

  step:
    method: POST
    path: /step
    description: Advance the simulation by one time step. Returns next state, reward, done flag, and info.

  state:
    method: GET
    path: /state
    description: Get the current simulation state without advancing.

# ── Observation space ────────────────────────────────────────────────────────
observation_space:
  type: Discrete
  description: >
    A tuple of 4 discretised vehicle-queue bins, one per lane (North, South, East, West).
    Each bin is an integer 0–3 representing queue density (0 = empty, 3 = full).
  shape: [4]
  dtype: int
  low: 0
  high: 3
  total_states: 256   # 4^4

# ── Action space ─────────────────────────────────────────────────────────────
action_space:
  type: Discrete
  n: 2
  actions:
    0: "North-South GREEN (East-West red)"
    1: "East-West GREEN (North-South red)"

# ── Reward ───────────────────────────────────────────────────────────────────
reward:
  description: >
    reward = cleared_weight * 2.0
           - waiting_vehicles * 0.5
           - idle_emissions * 0.05
           + 5.0 (if emergency vehicle cleared)
  min: -30
  max: 30

# ── Environment parameters ───────────────────────────────────────────────────
parameters:
  difficulty:
    type: string
    default: Medium
    choices: [Easy, Medium, Hard]
  max_steps:
    type: int
    default: 100
  enable_weather:
    type: bool
    default: true
  enable_time_patterns:
    type: bool
    default: true

# ── Agent ────────────────────────────────────────────────────────────────────
agent:
  type: Q-Learning
  algorithm: Tabular Q-Learning (off-policy TD control)
  state_space_size: 256
  action_space_size: 2
  saved_model: q_table.npy

# ── Tasks & Graders ──────────────────────────────────────────────────────────
tasks:
  - id: task_easy_efficiency
    description: Clear traffic efficiently under light load conditions.
    score: 0.8
    grader:
      type: match
  - id: task_medium_emissions
    description: Maintain low emissions during daytime traffic.
    score: 0.5
    grader:
      type: threshold
  - id: task_hard_emergency
    description: Handle emergency vehicles without causing heavy delays.
    score: 0.9
    grader:
      type: match
